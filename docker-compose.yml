services:
  postgres:
    image: postgres:16
    container_name: order_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DOCKER_ENV=true
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

